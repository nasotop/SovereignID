# SovereignID — stack listo para Portainer (+ Nginx Proxy Manager en el host)
#
# NPM escucha en 80/443 del servidor. Este stack publica el frontend en un
# puerto del host (WEB_HOST_PORT, p. ej. 4333). Como NPM también corre en
# Docker, NO uses localhost en el Proxy Host; apunta al gateway del host:
#   Forward Hostname: 172.17.0.1  (o la IP LAN del servidor)
#   Forward Port:     4333        (mismo valor que WEB_HOST_PORT)
#
# Dentro del contenedor web, nginx sigue en el puerto 80; el mapeo es
#   host:4333  →  contenedor:80
#
# auth-api no se publica al host; solo es accesible desde la red interna.
# postgres expone 5432 al host para exploración del esquema (psql, DBeaver).
# auth-api y web NO dependen de postgres en esta fase.

services:
  auth-api:
    build:
      context: .
      dockerfile: src/auth/Auth.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: sovereignid-auth:latest
    container_name: sovereignid-auth
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: ${ASPNETCORE_HTTP_PORTS:-8080}
      AUTH_JWT_SIGNING_KEY: ${AUTH_JWT_SIGNING_KEY:?AUTH_JWT_SIGNING_KEY is required}
      Auth__AllowedChainId: ${Auth__AllowedChainId:-11155111}
      Auth__JwtIssuer: ${Auth__JwtIssuer:-sovereignid-auth}
      Auth__JwtAudience: ${Auth__JwtAudience:-sovereignid-clients}
      Auth__ChallengeTtlSeconds: ${Auth__ChallengeTtlSeconds:-600}
      Auth__JwtTtlHours: ${Auth__JwtTtlHours:-24}
    expose:
      - "8080"
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/auth/nonce"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: auth-api
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "Sign-In with Ethereum (SIWE) Authentication Service"

  verifier-api:
    build:
      context: .
      dockerfile: src/verifier/Verifier.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: sovereignid-verifier:latest
    container_name: sovereignid-verifier
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: ${ASPNETCORE_HTTP_PORTS:-8080}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-sovereignid};Username=${POSTGRES_USER:-sovereignid};Password=${POSTGRES_PASSWORD:-sovereignid_dev}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: verifier-api
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "Public Verifiable Credential verification service"

  issuer-api:
    build:
      context: .
      dockerfile: src/issuer/Issuer.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: sovereignid-issuer:latest
    container_name: sovereignid-issuer
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: ${ASPNETCORE_HTTP_PORTS:-8080}
      Auth__JwtSigningKey: ${AUTH_JWT_SIGNING_KEY:?AUTH_JWT_SIGNING_KEY is required}
      Auth__JwtIssuer: ${Auth__JwtIssuer:-sovereignid-auth}
      Auth__JwtAudience: ${Auth__JwtAudience:-sovereignid-clients}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-sovereignid};Username=${POSTGRES_USER:-sovereignid};Password=${POSTGRES_PASSWORD:-sovereignid_dev}
      Persistence__Provider: Postgres
      Issuer__DefaultChainId: ${Issuer__DefaultChainId:-11155111}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: issuer-api
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "Verifiable Credential issuance and holder read service"

  academy-api:
    build:
      context: .
      dockerfile: src/academy/Academy.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: sovereignid-academy:latest
    container_name: sovereignid-academy
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: ${ASPNETCORE_HTTP_PORTS:-8080}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-sovereignid};Username=${POSTGRES_USER:-sovereignid};Password=${POSTGRES_PASSWORD:-sovereignid_dev}
      Persistence__Provider: ${Academy__Persistence__Provider:-InMemory}
      Academy__InvitationBaseUrl: ${Academy__InvitationBaseUrl:-http://localhost:4333/institution-invitations/accept}
      Academy__InvitationTtlHours: ${Academy__InvitationTtlHours:-72}
    expose:
      - "8080"
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: academy-api
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "Academic domain service (institutions, students, invitations)"

  identity-api:
    build:
      context: .
      dockerfile: src/identity/Identity.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: sovereignid-identity:latest
    container_name: sovereignid-identity
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: ${ASPNETCORE_HTTP_PORTS:-8080}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-sovereignid};Username=${POSTGRES_USER:-sovereignid};Password=${POSTGRES_PASSWORD:-sovereignid_dev}
      Persistence__Provider: ${Identity__Persistence__Provider:-InMemory}
    expose:
      - "8080"
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: identity-api
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "Identity service (health scaffold; business endpoints TBD)"

  bff-api:
    build:
      context: .
      dockerfile: src/bff/Bff.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: sovereignid-bff:latest
    container_name: sovereignid-bff
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: ${ASPNETCORE_HTTP_PORTS:-8080}
      Downstream__Verifier: http://verifier-api:8080
      Downstream__Issuer: http://issuer-api:8080
      Downstream__Academy: http://academy-api:8080
      Downstream__Identity: http://identity-api:8080
    expose:
      - "8080"
    depends_on:
      verifier-api:
        condition: service_started
      issuer-api:
        condition: service_started
      academy-api:
        condition: service_started
      identity-api:
        condition: service_started
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: bff-api
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "Backend-for-Frontend with Kiota downstream clients"

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    image: sovereignid-web:latest
    container_name: sovereignid-web
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-4333}:80"
    depends_on:
      auth-api:
        condition: service_healthy
      bff-api:
        condition: service_healthy
      verifier-api:
        condition: service_started
      issuer-api:
        condition: service_started
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: web
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "Angular Frontend + Nginx (auth directo + BFF /api/)"
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    container_name: sovereignid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sovereignid}
      POSTGRES_USER: ${POSTGRES_USER:-sovereignid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sovereignid_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/BBDD_SovereignID.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: postgres
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "PostgreSQL 16 — canonical schema from database/BBDD_SovereignID.sql"

networks:
  sovereign-net:
    driver: bridge

volumes:
  postgres_data:
