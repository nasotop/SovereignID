# SovereignID — stack listo para Portainer (+ Nginx Proxy Manager en el host)
#
# NPM escucha en 80/443 del servidor. Este stack publica el frontend en un
# puerto del host (WEB_HOST_PORT, p. ej. 4333). Como NPM también corre en
# Docker, NO uses localhost en el Proxy Host; apunta al gateway del host:
#   Forward Hostname: 172.17.0.1  (o la IP LAN del servidor)
#   Forward Port:     4333        (mismo valor que WEB_HOST_PORT)
#
# Dentro del contenedor web, nginx sigue en el puerto 80; el mapeo es
#   host:4333  →  contenedor:80
#
# auth-api no se publica al host; solo es accesible desde la red interna.
# postgres expone 5432 al host para exploración del esquema (psql, DBeaver).
# auth-api y web NO dependen de postgres en esta fase.

services:
  auth-api:
    build:
      context: .
      dockerfile: src/auth/Auth.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    image: sovereignid-auth:latest
    container_name: sovereignid-auth
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: ${ASPNETCORE_HTTP_PORTS:-8080}
      AUTH_JWT_SIGNING_KEY: ${AUTH_JWT_SIGNING_KEY:?AUTH_JWT_SIGNING_KEY is required}
      Auth__AllowedChainId: ${Auth__AllowedChainId:-11155111}
      Auth__JwtIssuer: ${Auth__JwtIssuer:-sovereignid-auth}
      Auth__JwtAudience: ${Auth__JwtAudience:-sovereignid-clients}
      Auth__ChallengeTtlSeconds: ${Auth__ChallengeTtlSeconds:-600}
      Auth__JwtTtlHours: ${Auth__JwtTtlHours:-24}
    expose:
      - "8080"
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/auth/nonce"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: auth-api
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "Sign-In with Ethereum (SIWE) Authentication Service"

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    image: sovereignid-web:latest
    container_name: sovereignid-web
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-4333}:80"
    depends_on:
      auth-api:
        condition: service_healthy
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: web
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "Angular Frontend + Nginx Reverse Proxy"
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    container_name: sovereignid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sovereignid}
      POSTGRES_USER: ${POSTGRES_USER:-sovereignid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sovereignid_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/BBDD_SovereignID.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignid.service: postgres
      com.sovereignid.version: "1.0"
      com.sovereignid.description: "PostgreSQL 16 — canonical schema from database/BBDD_SovereignID.sql"

networks:
  sovereign-net:
    driver: bridge

volumes:
  postgres_data:
